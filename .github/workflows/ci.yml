name: CI pipeline 

on: 
  push: 
  pull_request: 

jobs:
  check-code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          pip install uv
          uv sync
          uv add ruff
      
      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Check imports
        run: python -c "import src"
        